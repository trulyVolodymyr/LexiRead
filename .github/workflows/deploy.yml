name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate static site
        run: npx nuxt generate
        env:
          NUXT_APP_BASE_URL: /LexiRead/
          # Supabase credentials are not in the repo (.env is gitignored);
          # they come from the repository's Actions secrets.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Prepare Pages output
        # 404.html makes GitHub Pages serve the SPA shell for deep links
        # like /read/123; .nojekyll stops Pages from filtering _-prefixed files.
        run: |
          [ -f .output/public/404.html ] || cp .output/public/200.html .output/public/404.html
          touch .output/public/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
